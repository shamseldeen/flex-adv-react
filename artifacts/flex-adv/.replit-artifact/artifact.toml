kind = "web"
previewPath = "/"
title = "Flex for Advertising"
version = "1.0.0"
id = "artifacts/flex-adv"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23668

[services.development]
run = "pnpm --filter @workspace/flex-adv run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flex-adv", "run", "build" ]
publicDir = "artifacts/flex-adv/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23668"
BASE_PATH = "/"
